<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Ratchet template page</title>

        <!-- Sets initial viewport load and disables zooming  -->
        <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, minimal-ui">

        <!-- Makes your prototype chrome-less once bookmarked to your phone's home screen -->
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black">

        <!-- Include the compiled Ratchet CSS -->
        <link href="assets/ratchet/css/ratchet.css" rel="stylesheet">
        <link href="css/main.css" rel="stylesheet">
        <!--        <link href="assets/ratchet/css/ratchet-theme-android.css" rel="stylesheet">-->

        <!-- Include the compiled Ratchet JS -->
        <script src="assets/ratchet/js/ratchet.js"></script>
    </head>
    <body>

        <!-- Make sure all your bars are the first things in your <body> -->
        <header>
            <img class="header" src="img/rupee.png"/>
            <h1>iChit</h1>
        </header>
        <button class="btn btn-primary btn-block ">
            New Chit
            <span class="icon icon-right-nav"></span>
        </button>
        <button class="btn btn-positive btn-block">
            Upcoming Chits
            <span class="icon icon-right-nav"></span>
        </button>

        <!-- Wrap all non-bar HTML in the .content div (this is actually what scrolls) -->

    </body>
</html>
